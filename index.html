<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Green Earth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- Navbar -->
    <!-- Navbar -->
    <nav class="bg-green-800 px-8 py-4 flex items-center justify-between">
        <!-- Logo -->
        <div class="text-white text-xl font-bold">Green Earth</div>

        <!-- Menu Items -->
        <ul class="flex gap-8 text-white font-medium">
            <li><a href="#">About</a></li>
            <li><a href="#">Gallery</a></li>
            <li><a href="#">Plant a Tree</a></li>
        </ul>

        <!-- Button -->
        <button class="bg-yellow-400 text-green-900 font-bold px-6 py-2 rounded-full hover:bg-yellow-300">
            Plant a Tree
        </button>
    </nav>
    <!-- Banner -->
    <!-- Banner -->
    <section class="bg-green-100 py-20 px-8 text-center relative overflow-hidden">
        <!-- Left Leaf -->
        <img src="assets/hero-leaf1.png" alt="leaf" class="absolute left-0 bottom-0 w-64 opacity-90">

        <!-- Right Leaf -->
        <img src="assets/hero-leaf2.png" alt="leaf" class="absolute right-0 bottom-0 w-64 opacity-90">

        <!-- Content -->
        <div class="relative z-10">
            <h1 class="text-5xl font-bold text-gray-800 mb-4">
                Plant a Tree, Grow a Future
            </h1>
            <p class="text-gray-600 text-lg mb-8">
                Join our mission to plant 1 million trees and make the Earth greener for future generations.
            </p>
            <button class="bg-yellow-400 text-green-900 font-bold px-8 py-3 rounded-full hover:bg-yellow-300">
                Get Involved
            </button>
        </div>
    </section>
    <!-- Choose Your Trees -->
    <!-- Choose Your Trees -->
    <section class="py-12 px-8 bg-white">
        <h2 class="text-3xl font-bold text-center text-gray-800 mb-8">Choose Your Trees</h2>

        <div class="flex gap-6">

            <!-- Categories Left -->
            <div class="w-1/5">
                <h3 class="font-bold text-gray-700 mb-4">Categories</h3>
                <div id="categories" class="flex flex-col gap-2"></div>
            </div>

            <!-- Cards Center -->
            <div class="w-3/5">
                <div id="tree-cards" class="grid grid-cols-3 gap-4"></div>
            </div>

            <!-- Cart Right -->
            <div class="w-1/5 bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
                <h3 class="font-bold text-gray-800 text-lg mb-4">Your Cart</h3>
                <div id="cart-items" class="flex flex-col gap-2 mb-4"></div>
                <div class="border-t pt-3">
                    <p class="font-bold text-gray-800 flex justify-between">
                        <span>Total:</span>
                        <span id="cart-total">৳0</span>
                    </p>
                </div>
            </div>

        </div>
    </section>
    <!-- About Campaign -->
    <!-- Our Impact -->
    <!-- Plant a Tree Form -->
    <!-- Footer -->

    <script src="script.js"></script>


    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
        <div class="bg-white rounded-lg p-6 w-96 max-w-full relative">
            <button onclick="closeModal()"
                class="absolute top-2 right-2 text-gray-500 hover:text-red-500 font-bold text-xl">✕</button>
            <div id="modal-content"></div>
        </div>
    </div>
</body>

</html>
